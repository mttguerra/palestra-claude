<section data-block="b09b" class="block block--b09b">
  <div class="b09b-stage">
    <header class="b09b-headline">
      <h2 class="t-title">O que é uma <span class="accent">skill</span>?</h2>
    </header>

    <div class="b09b-split">
      <!-- A máquina (toda em HTML/CSS) -->
      <div class="b09b-machine-wrap" aria-hidden="true">
        <div class="b09b-machine-label">Skill = <span class="accent">máquina de café</span></div>
        <div class="coffee-machine">
          <!-- vapor saindo do topo -->
          <div class="coffee-machine__steam">
            <span></span><span></span><span></span><span></span>
          </div>

          <!-- corpo -->
          <div class="coffee-machine__body">
            <!-- painel digital -->
            <div class="coffee-machine__panel">
              <div class="coffee-machine__display">
                <span class="coffee-machine__display-star">✶</span>
                <span class="coffee-machine__display-text">brainstorming<span class="coffee-machine__display-dot">.</span><span class="coffee-machine__display-dot">.</span><span class="coffee-machine__display-dot">.</span></span>
              </div>
              <div class="coffee-machine__buttons">
                <span class="coffee-machine__btn coffee-machine__btn--on">
                  <span class="coffee-machine__btn-icon" data-icon="espresso"></span>
                </span>
                <span class="coffee-machine__btn"></span>
                <span class="coffee-machine__btn"></span>
              </div>
            </div>

            <!-- grupo (cabeça que sai pra frente) -->
            <div class="coffee-machine__group">
              <div class="coffee-machine__group-face"></div>
              <div class="coffee-machine__spout">
                <span class="coffee-machine__drip coffee-machine__drip--a"></span>
                <span class="coffee-machine__drip coffee-machine__drip--b"></span>
              </div>
            </div>
          </div>

          <!-- bandeja + xícara -->
          <div class="coffee-machine__tray">
            <div class="coffee-machine__cup">
              <div class="coffee-machine__cup-fill"></div>
              <div class="coffee-machine__cup-handle"></div>
            </div>
          </div>
        </div>
      </div>

      <!-- A explicação -->
      <div class="b09b-explain">
        <ul class="b09b-steps">
          <li><span class="b09b-x">✕</span><span>Você <strong>não</strong> mói o grão</span></li>
          <li><span class="b09b-x">✕</span><span>Você <strong>não</strong> dosa o pó</span></li>
          <li><span class="b09b-x">✕</span><span>Você <strong>não</strong> esquenta a água</span></li>
          <li><span class="b09b-x">✕</span><span>Você <strong>não</strong> bate o vapor</span></li>
        </ul>

        <div class="b09b-press">
          <span class="b09b-press-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="3" fill="currentColor"/></svg>
          </span>
          <div class="b09b-press-text">
            Você aperta <span class="accent">UM</span> botão.<br />
            O processo inteiro acontece <strong>sozinho</strong>.
          </div>
        </div>
      </div>
    </div>
  </div>
</section>
