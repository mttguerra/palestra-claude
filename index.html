<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Palestra IA · Pedro</title>
  </head>
  <body>
    <!-- Fundo ambient persistente: bolas suaves flutuando em loop infinito.
         Fica atrás do Reveal e nunca é re-renderizado entre slides. -->
    <div class="ambient-bg" aria-hidden="true">
      <div class="ambient-blob ambient-blob--1"></div>
      <div class="ambient-blob ambient-blob--2"></div>
      <div class="ambient-blob ambient-blob--3"></div>
      <div class="ambient-blob ambient-blob--4"></div>
      <div class="ambient-blob ambient-blob--5"></div>
    </div>

    <div class="reveal">
      <div class="slides" id="slides-root">
        <!-- Slides serão injetados via main.js a partir de src/blocks/ -->
      </div>
    </div>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
